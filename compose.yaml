services:
  postgres:
    image: postgres:16
    container_name: kzone-postgres
    environment:
      POSTGRES_DB: kzoneworkspace
      POSTGRES_USER: kzone
      POSTGRES_PASSWORD: kzone1234
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data: